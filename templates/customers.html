{% extends 'base.html' %}

{% block content %}
<h1>Customers</h1>

<p>
    <a href="{{ url_for('add_customer') }}" class="btn btn-primary">+ Add Customer</a>
</p>

<table class="table">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Company</th>
        <th>Phone</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
    {% for c in customers %}
    <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.email }}</td>
        <td>{{ c.company }}</td>
        <td>{{ c.phone }}</td>
        <td>{{ c.status }}</td>
        <td>
            <a href="{{ url_for('customer_detail', customer_id=c.id) }}" class="btn btn-sm btn-primary">View</a>
            <a href="{{ url_for('edit_customer', customer_id=c.id) }}" class="btn btn-sm btn-primary">Edit</a>
            <form method="POST" action="{{ url_for('delete_customer', customer_id=c.id) }}" style="display:inline">
                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

<!-- Karte für Kundenadressen -->
{% if customers %}
<div class="mt-4">
    <h2>Kundenstandorte</h2>
    <div id="map" style="height: 400px; width: 100%;"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Karte initialisieren
    var map = L.map('map').setView([51.505, -0.09], 2);  // Standardansicht (Europa)

    // OpenStreetMap-Kacheln hinzufügen
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Marker für jeden Kunden hinzufügen
    {% for c in customers %}
    {% if c.lat and c.lng %}
    L.marker([{{ c.lat }}, {{ c.lng }}]).addTo(map)
        .bindPopup(`
            <b>{{ c.name }}</b><br>
            {{ c.street }}, {{ c.postal_code }} {{ c.city }}<br>
            {{ c.country }}<br>
            <a href="{{ url_for('customer_detail', customer_id=c.id) }}">Details anzeigen</a>
        `);
    {% endif %}
    {% endfor %}
});
</script>
{% endif %}
{% endblock %}
