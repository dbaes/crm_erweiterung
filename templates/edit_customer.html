{% extends 'base.html' %}

{% block content %}
<h1>Kunden bearbeiten</h1>

<form method="POST">
    <div class="form-group">
        <label>Name:</label>
        <input type="text" name="name" class="form-control" value="{{ customer.name }}" required>
    </div>

    <div class="form-group">
        <label>E-Mail:</label>
        <input type="email" name="email" class="form-control" value="{{ customer.email }}" required>
    </div>

    <div class="form-group">
        <label>Firma:</label>
        <input type="text" name="company" class="form-control" value="{{ customer.company }}" required>
    </div>

    <div class="form-group">
        <label>Telefon:</label>
        <input type="text" name="phone" class="form-control" value="{{ customer.phone }}" required>
    </div>

    <div class="form-group">
        <label>Straße:</label>
        <input type="text" id="street" name="street" class="form-control" value="{{ customer.street }}" required>
    </div>

    <div class="form-group">
        <label>PLZ:</label>
        <input type="text" id="postal_code" name="postal_code" class="form-control" value="{{ customer.postal_code }}" required>
    </div>

    <div class="form-group">
        <label>Ort:</label>
        <input type="text" id="city" name="city" class="form-control" value="{{ customer.city }}" required>
    </div>

    <div class="form-group">
        <label>Land:</label>
        <input type="text" id="country" name="country" class="form-control" value="{{ customer.country }}" required>
    </div>

    <div class="form-group">
        <label>Status:</label>
        <select name="status" class="form-control">
            <option value="prospect" {% if customer.status == 'prospect' %}selected{% endif %}>Interessent</option>
            <option value="active" {% if customer.status == 'active' %}selected{% endif %}>Aktiv</option>
            <option value="inactive" {% if customer.status == 'inactive' %}selected{% endif %}>Inaktiv</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary">Kunde aktualisieren</button>
</form>
{% endblock %}
