{% extends 'base.html' %}

{% block content %}
<h1>Leads</h1>
<a href="{{ url_for('add_lead') }}" class="btn btn-primary mb-3">+ Add Lead</a>
<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Company</th>
            <th>Value</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for lead in leads %}
        <tr>
            <td>{{ lead.name }}</td>
            <td>{{ lead.email }}</td>
            <td>{{ lead.company }}</td>
            <td>{{ lead.value }}</td>
            <td>{{ lead.status }}</td>
            <td>
                <a href="{{ url_for('lead_detail', lead_id=lead.id) }}" class="btn btn-sm btn-primary">View</a>
                <a href="{{ url_for('edit_lead', lead_id=lead.id) }}" class="btn btn-sm btn-primary">Edit</a>
                <form method="POST" action="{{ url_for('delete_lead', lead_id=lead.id) }}" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
