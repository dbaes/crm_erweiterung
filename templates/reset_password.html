{% extends "base.html" %}

{% block title %}Neues Passwort vergeben{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Neues Passwort</h3>
                <p class="text-muted small">
                    Wähle jetzt ein neues, sicheres Passwort für deinen Account.
                </p>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="password" class="form-label">Neues Passwort</label>
                        <input type="password" name="password" id="password" class="form-control" 
                               placeholder="Mindestens 8 Zeichen" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Passwort bestätigen</label>
                        <input type="password" name="confirm_password" id="confirm_password" 
                               class="form-control" placeholder="Passwort erneut eingeben" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Passwort speichern</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Kleiner Check, ob Passwörter übereinstimmen (Client-side)
    var password = document.getElementById("password");
    var confirm_password = document.getElementById("confirm_password");

    function validatePassword(){
      if(password.value != confirm_password.value) {
        confirm_password.setCustomValidity("Passwörter stimmen nicht überein");
      } else {
        confirm_password.setCustomValidity('');
      }
    }

    password.onchange = validatePassword;
    confirm_password.onkeyup = validatePassword;
</script>
{% endblock %}
