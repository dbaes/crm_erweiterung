{% extends "base.html" %}  

{% block content %}
<div class="container mt-4">
    <h1>Admin-Dashboard</h1>
    <p>Hier kannst du Benutzerrollen verwalten.</p>

    <div class="card mb-4">
        <div class="card-header">
            <h2>Benutzerliste</h2>
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Benutzername</th>
                        <th>Rolle</th>
                        <th>Aktion</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.id }}</td>
                        <td>{{ user.username }}</td>
                        <td>
                            <span class="badge {% if user.role == 'admin' %}bg-danger{% else %}bg-primary{% endif %}">
                                {{ user.role }}
                            </span>
                        </td>
                        <td>
                            <form action="{{ url_for('update_user_role', user_id=user.id) }}" method="post">
                                <select name="role" class="form-select form-select-sm d-inline w-auto">
                                    <option value="user" {% if user.role == 'user' %}selected{% endif %}>Benutzer</option>
                                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-success">Rolle ändern</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <a href="{{ url_for('index') }}" class="btn btn-secondary">Zurück zur Startseite</a>
</div>
{% endblock %}
