{% extends "base.html" %}

{% block title %}Passwort vergessen{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Passwort zurücksetzen</h3>
                <p class="text-muted small">
                    Gib deine E-Mail-Adresse ein. Wir senden dir einen Link, mit dem du dein Passwort neu setzen kannst.
                </p>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-Mail-Adresse</label>
                        <input type="email" name="email" id="email" class="form-control" 
                               placeholder="name@beispiel.at" required autofocus>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Link anfordern</button>
                    </div>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{{ url_for('login') }}" class="text-decoration-none small">Zurück zum Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
