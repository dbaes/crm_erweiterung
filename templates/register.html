{% extends "base.html" %}

{% block title %}Registrieren{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Account erstellen</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Benutzername</label>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Dein Name" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">E-Mail-Adresse</label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="name@beispiel.at" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Passwort</label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Sicheres Passwort" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Registrieren</button>
                    </div>
                </form>
                <hr>
                <div class="text-center">
                    <p class="small">Bereits Mitglied? <a href="{{ url_for('login') }}" class="text-decoration-none">Hier einloggen</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
